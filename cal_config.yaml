  # eval_eps: 10
  prefill: 5000
  camera: corner
  # FB configs
  fb_train_until: 2e5
  fb_config:
    fb_train_until: 2e5
    fb_ckpt: null

    obs_dim: 384
    action_dim: 4
    z_dim: 64
    hidden_dim: 512
    feature_dim: 512
    
    device: null
    
    fb_lr: 1e-4
    ortho_coef: 1.0
    target_tau: 0.01
    
    preprocess: false
    add_trunk: true
    norm_z: true


